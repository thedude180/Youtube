<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreatorOS - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0f; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; background: rgba(124, 58, 237, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 32px; height: 32px; color: #7c3aed; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #a1a1aa; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button { background: #7c3aed; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>CreatorOS needs an internet connection to work. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
